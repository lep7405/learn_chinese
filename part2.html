<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Part 2 · Từ vựng tiếng Trung</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
        padding: 24px 16px;
      }

      h1 {
        text-align: center;
        font-size: 1.4rem;
        color: #a0c4ff;
        margin-bottom: 24px;
        letter-spacing: 1px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 14px;
        max-width: 700px;
        margin: 0 auto;
      }

      .card {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 14px;
        padding: 18px 10px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition:
          transform 0.15s,
          border-color 0.15s,
          background 0.15s;
        user-select: none;
      }

      .card:hover {
        transform: scale(1.04);
        border-color: #a0c4ff;
      }
      .card:active {
        transform: scale(0.97);
      }

      .card.revealed {
        background: #0f3460;
        border-color: #4cc9f0;
      }

      .hanzi {
        font-size: 2.4rem;
        line-height: 1;
        color: #f0f0f0;
        display: none;
      }

      .card.revealed .hanzi {
        display: block;
      }

      .info {
        text-align: center;
        display: none;
        animation: fadeIn 0.2s ease;
      }

      .card.revealed .info {
        display: block;
      }

      .pinyin {
        font-size: 0.85rem;
        color: #4cc9f0;
        margin-bottom: 3px;
      }

      .viet {
        font-size: 0.8rem;
        color: #a0c4ff;
      }

      .speaker-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.5rem;
        padding: 4px 8px;
        border-radius: 8px;
        transition: background 0.15s;
        line-height: 1;
      }

      .speaker-btn:hover {
        background: rgba(76, 201, 240, 0.15);
      }

      .copy-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 4px 8px;
        border-radius: 8px;
        transition: background 0.15s;
        line-height: 1;
        display: none;
      }

      .card.revealed .copy-btn {
        display: inline-block;
      }
      .copy-btn:hover {
        background: rgba(160, 196, 255, 0.15);
      }

      .btn-row {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      /* mode: viet-only */
      body.viet-mode .hanzi {
        display: none !important;
      }
      body.viet-mode .btn-row {
        display: none !important;
      }
      body.viet-mode .info {
        display: block !important;
      }
      body.viet-mode .info .pinyin {
        display: none;
      }
      body.viet-mode .card.revealed .hanzi {
        display: block !important;
      }
      body.viet-mode .card.revealed .btn-row {
        display: flex !important;
      }
      body.viet-mode .card.revealed .info .pinyin {
        display: block;
      }

      /* mode: hanzi-only */
      body.hanzi-mode .hanzi {
        display: block !important;
      }
      body.hanzi-mode .btn-row {
        display: none !important;
      }
      body.hanzi-mode .info {
        display: none !important;
      }
      body.hanzi-mode .card.revealed .info {
        display: block !important;
      }
      body.hanzi-mode .card.revealed .btn-row {
        display: flex !important;
      }

      .top-bar {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .mode-btn {
        background: #0f3460;
        border: 1px solid #4cc9f0;
        color: #4cc9f0;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.9rem;
        transition:
          background 0.15s,
          color 0.15s;
      }

      .mode-btn:hover {
        background: #4cc9f0;
        color: #1a1a2e;
      }
      .mode-btn.active {
        background: #4cc9f0;
        color: #1a1a2e;
        font-weight: bold;
      }

      .part-nav {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .part-btn {
        background: #0a0a1a;
        border: 1px solid #333;
        color: #888;
        padding: 5px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 0.85rem;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
        text-decoration: none;
        display: inline-block;
      }
      .part-btn:hover {
        border-color: #a0c4ff;
        color: #a0c4ff;
      }
      .part-btn.current {
        background: #16213e;
        border-color: #a0c4ff;
        color: #a0c4ff;
        font-weight: bold;
        cursor: default;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

      for (let i = words.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [words[i], words[j]] = [words[j], words[i]];
      }

      function speak(text, e) {
        if (e) e.stopPropagation();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = "zh-CN";
        utt.rate = 0.85;
        speechSynthesis.cancel();
        speechSynthesis.speak(utt);
      }

      const grid = document.getElementById("grid");

      words.forEach((w) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
    <div class="hanzi">${w.zh}</div>
    <div class="btn-row">
      <button class="speaker-btn" title="Phát âm">🔊</button>
      <button class="copy-btn" title="Copy">📋</button>

      <div class="viet">${w.viet}</div>
    </div>

          card.classList.toggle("revealed");
        });

        card.querySelector(".speaker-btn").addEventListener("click", (e) => {
          speak(w.zh, e);
        });

        card.querySelector(".copy-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          navigator.clipboard.writeText(w.zh).then(() => {
            const btn = e.currentTarget;
            btn.textContent = "✅";
            setTimeout(() => (btn.textContent = "📋"), 1200);
          });
        });

        grid.appendChild(card);
      });

      function setMode(mode) {
        document.body.classList.remove("hanzi-mode", "viet-mode");
        document.querySelectorAll(".mode-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".card").forEach((c) => c.classList.remove("revealed"));

        if (mode === "hanzi") {
          document.body.classList.add("hanzi-mode");
          document.getElementById("btn-hanzi").classList.add("active");
        } else if (mode === "viet") {
          document.body.classList.add("viet-mode");
          document.getElementById("btn-viet").classList.add("active");
        } else {
          document.getElementById("btn-normal").classList.add("active");
