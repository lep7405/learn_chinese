<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tiếng Anh</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f7efe4 0%, #f4d8c1 100%);
            --card: rgba(255, 250, 245, 0.92);
            --text: #2b1d18;
            --accent: #b85c38;
            --accent-dark: #8f4325;
            --border: rgba(86, 43, 28, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .app {
            width: min(720px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(91, 48, 31, 0.18);
        }

        h1 { margin: 0 0 8px; font-size: clamp(1.6rem, 4vw, 2.4rem); }
        p  { margin: 0 0 20px; line-height: 1.5; }

        button {
            border: 0;
            border-radius: 999px;
            padding: 10px 18px;
            font: inherit;
            color: #fffaf5;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }
        button:hover { transform: translateY(-1px); background: var(--accent-dark); }
        button:disabled { opacity: 0.45; cursor: default; transform: none; }

        .actions { display: flex; flex-wrap: wrap; gap: 12px; }

        .word-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 0;
            display: grid;
            gap: 14px;
        }

        .word-item {
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            background: #fffdfb;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .word-item:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(91,48,31,0.12); }

        .hint { margin-top: 16px; font-size: 0.95rem; opacity: 0.8; }

        /* ── Toolbar ── */
        .en-toolbar {
            display: grid;
            gap: 12px;
            margin: 0 0 20px;
            padding: 16px 18px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: #fffdfb;
        }
        .en-toolbar-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .en-summary { font-size: 0.95rem; opacity: 0.82; }

        .text-input {
            width: min(320px, 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 14px;
            font: inherit;
            background: #fffdfb;
            color: var(--text);
        }

        /* ── Status chips filter ── */
        .en-chip-row { display: flex; flex-wrap: wrap; gap: 8px; }

        .en-status-chip {
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font: inherit;
            font-size: 0.88rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .en-status-chip:hover { background: rgba(184,92,56,0.1); }
        .en-status-chip[data-status="all"].active    { background: var(--accent-dark); color: #fffaf5; border-color: transparent; }
        .en-status-chip[data-status="new"].active    { background: #757575; color: #fff; border-color: transparent; }
        .en-status-chip[data-status="learning"].active { background: #e6820a; color: #fff; border-color: transparent; }
        .en-status-chip[data-status="mastered"].active { background: #2e7d32; color: #fff; border-color: transparent; }

        /* ── Card header ── */
        .en-card { cursor: pointer; }
        .en-card-header { display: grid; gap: 8px; }
        .en-vietnamese { font-size: 1.2rem; font-weight: 700; line-height: 1.5; }

        .en-meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

        .en-chip {
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(184,92,56,0.12);
            color: var(--accent-dark);
            font-size: 0.85rem;
        }

        /* ── Status badge ── */
        .en-status-badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.15s;
        }
        .en-status-badge:hover { opacity: 0.72; }
        .en-status-badge[data-s="new"]      { background: #e0e0e0; color: #424242; }
        .en-status-badge[data-s="learning"] { background: #fff3e0; color: #e65100; }
        .en-status-badge[data-s="mastered"] { background: #e8f5e9; color: #1b5e20; }

        /* ── Card details ── */
        .en-details {
            display: grid;
            gap: 14px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .en-details[hidden] { display: none; }

        .en-block { display: grid; gap: 8px; }
        .en-block-title {
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-dark);
            opacity: 0.85;
        }

        .en-correct {
            padding: 12px 16px;
            border-radius: 14px;
            background: #edf7ed;
            border-left: 3px solid #4caf50;
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.55;
            color: #1b5e20;
        }
        .en-wrong {
            padding: 12px 16px;
            border-radius: 14px;
            background: #fdf0ee;
            border-left: 3px solid #e57373;
            line-height: 1.5;
            color: #7f1d1d;
        }
        .en-pattern {
            padding: 12px 14px;
            border-radius: 14px;
            background: #fdf4ec;
            line-height: 1.5;
        }

        .en-notes, .en-scenarios { margin: 0; padding-left: 20px; line-height: 1.7; }
        .en-notes > li, .en-scenarios > li { margin-bottom: 6px; }
        .en-scenarios > li {
            padding: 8px 14px;
            border-radius: 10px;
            background: #fdf4ec;
            list-style: none;
            margin-left: -20px;
        }
        .en-scenario-correct { color: #2e7d32; font-weight: 700; }
        .en-scenario-wrong   { color: #b71c1c; opacity: 0.85; }

        .en-steps { display: grid; gap: 10px; }
        .en-step {
            display: grid;
            gap: 6px;
            padding: 12px 14px;
            border-radius: 14px;
            background: #fdf4ec;
            line-height: 1.55;
        }
        .en-step-num {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--accent-dark);
            opacity: 0.7;
        }
        .en-step-source { font-weight: 700; }
        .en-step-line   { opacity: 0.9; }
        .en-step-arrow  { color: var(--accent); }

        .en-empty {
            padding: 18px;
            border: 1px dashed var(--border);
            border-radius: 16px;
            background: #fffdfb;
            text-align: center;
            opacity: 0.8;
        }

        /* ── Quiz ── */
        .en-quiz-progress { display: grid; gap: 6px; margin-bottom: 16px; font-size: 0.92rem; opacity: 0.85; }
        .en-quiz-bar-wrap { height: 6px; border-radius: 999px; background: var(--border); overflow: hidden; }
        .en-quiz-bar { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.3s; width: 0%; }

        .en-quiz-card {
            display: grid;
            gap: 14px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: #fffdfb;
        }
        .en-quiz-vn { font-size: 1.25rem; font-weight: 700; line-height: 1.5; }
        .en-quiz-input-wrap { display: grid; gap: 10px; }
        .en-quiz-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            font: inherit;
            font-size: 1rem;
            background: #fffaf5;
            color: var(--text);
            resize: vertical;
            line-height: 1.5;
        }
        .en-quiz-input:focus { outline: 2px solid var(--accent); }

        .en-quiz-result { display: grid; gap: 10px; padding: 14px 16px; border-radius: 14px; }
        .en-quiz-result[hidden] { display: none; }
        .en-quiz-result.correct { background: #edf7ed; border-left: 3px solid #4caf50; }
        .en-quiz-result.wrong   { background: #fdf0ee; border-left: 3px solid #e57373; }
        .en-quiz-result-answer  { font-size: 1.05rem; font-weight: 700; }
        .en-quiz-diff           { font-size: 0.95rem; line-height: 1.7; }
        .en-quiz-diff del { color: #c62828; text-decoration: line-through; opacity: 0.8; }
        .en-quiz-diff ins { color: #2e7d32; text-decoration: none; font-weight: 700; }

        .en-quiz-actions { display: flex; gap: 12px; }
        .en-quiz-actions[hidden] { display: none; }
        .en-quiz-status-row { display: flex; gap: 10px; align-items: center; font-size: 0.9rem; }
        .en-quiz-done { padding: 32px; text-align: center; display: grid; gap: 12px; }
    </style>
</head>
<body>
    <main class="app">
        <h1>Luyện tiếng Anh</h1>
        <p>Mặc định chỉ hiện tiếng Việt. Bấm vào từng thẻ để hiện câu tiếng Anh và phần phân tích.</p>

        <div class="en-toolbar">
            <div class="en-toolbar-row">
                <input id="en-search" class="text-input" type="search" placeholder="Tìm theo tiếng Việt, tiếng Anh, pattern..." />
            </div>
            <div class="en-toolbar-row">
                <div id="en-status-chips" class="en-chip-row"></div>
            </div>
            <div id="en-summary" class="en-summary">Đang chuẩn bị dữ liệu từ en.json.</div>
        </div>

        <div class="actions">
            <button id="en-all-btn" type="button">Toàn bộ</button>
            <button id="en-random-btn" type="button">Ngẫu nhiên</button>
            <button id="en-quiz-btn" type="button">Quiz</button>
        </div>

        <!-- Browse mode -->
        <ul id="en-list" class="word-list"></ul>

        <!-- Quiz mode -->
        <div id="en-quiz" hidden>
            <div class="en-quiz-progress">
                <span id="en-quiz-count"></span>
                <div class="en-quiz-bar-wrap"><div id="en-quiz-bar" class="en-quiz-bar"></div></div>
            </div>
            <div id="en-quiz-card" class="en-quiz-card">
                <div id="en-quiz-vn" class="en-quiz-vn"></div>
                <div class="en-quiz-input-wrap">
                    <textarea id="en-quiz-input" class="en-quiz-input" rows="3" placeholder="Gõ câu tiếng Anh của bạn..."></textarea>
                    <button id="en-quiz-check-btn" type="button">Kiểm tra</button>
                </div>
                <div id="en-quiz-result" class="en-quiz-result" hidden></div>
                <div id="en-quiz-actions" class="en-quiz-actions" hidden>
                    <button id="en-quiz-next-btn" type="button">Câu tiếp →</button>
                </div>
            </div>
            <div class="actions" style="margin-top:16px">
                <button id="en-quiz-exit-btn" type="button">Thoát quiz</button>
            </div>
        </div>

        <div id="en-hint" class="hint">Đọc toàn bộ dữ liệu từ file en.json.</div>
    </main>
    <script src="index.js"></script>
</body>
</html>
