<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Từ vựng mua sắm - 购物词汇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      color: #a0c4ff;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px;
      max-width: 700px;
      margin: 0 auto;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 14px;
      padding: 18px 10px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .card:hover { transform: scale(1.04); border-color: #a0c4ff; }
    .card:active { transform: scale(0.97); }

    .card.revealed {
      background: #0f3460;
      border-color: #4cc9f0;
    }

    .hanzi {
      font-size: 2.4rem;
      line-height: 1;
      color: #f0f0f0;
      display: none;
    }

    .card.revealed .hanzi { display: block; }

    .info {
      text-align: center;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .card.revealed .info { display: block; }

    .pinyin {
      font-size: 0.85rem;
      color: #4cc9f0;
      margin-bottom: 3px;
    }

    .viet {
      font-size: 0.8rem;
      color: #a0c4ff;
    }

    .speaker-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.15s;
      line-height: 1;
    }

    .speaker-btn:hover { background: rgba(76,201,240,0.15); }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.15s;
      line-height: 1;
      display: none;
    }

    .card.revealed .copy-btn { display: inline-block; }
    .copy-btn:hover { background: rgba(160,196,255,0.15); }
    .copy-btn.copied { filter: grayscale(0); }

    .example-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.15s;
      line-height: 1;
      display: none;
    }
    .card.revealed .example-btn { display: inline-block; }
    .example-btn:hover { background: rgba(160,255,180,0.15); }

    .example-box {
      display: none;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #4cc9f0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 4px;
      text-align: left;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }
    .example-box.show { display: block; }
    .ex-zh { font-size: 1rem; color: #f0f0f0; margin-bottom: 4px; }
    .ex-pinyin { font-size: 0.78rem; color: #4cc9f0; margin-bottom: 3px; }
    .ex-viet { font-size: 0.78rem; color: #a0c4ff; margin-bottom: 6px; }

    .word-table {
      display: none;
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.78rem;
    }
    .word-table.show { display: table; }
    .word-table th {
      color: #888;
      font-weight: normal;
      padding: 3px 6px;
      border-bottom: 1px solid #0f3460;
      text-align: left;
    }
    .word-table td {
      padding: 4px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .word-table td:first-child { color: #f0f0f0; font-size: 1rem; }
    .word-table td:nth-child(2) { color: #4cc9f0; }
    .word-table td:nth-child(3) { color: #a0c4ff; }

    .analyze-btn {
      background: none;
      border: 1px solid #0f3460;
      color: #888;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      display: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .analyze-btn:hover { border-color: #4cc9f0; color: #4cc9f0; }
    body.sentence-mode .card.revealed .analyze-btn { display: inline-block; }

    .add-word-btn {
      background: none;
      border: 1px solid #2a4a2a;
      color: #6adb6a;
      font-size: 0.72rem;
      padding: 1px 7px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .add-word-btn:hover { background: rgba(106,219,106,0.15); border-color: #6adb6a; }
    .add-word-btn.added { color: #888; border-color: #333; cursor: default; }

    .added-badge {
      display: inline-block;
      font-size: 0.65rem;
      background: rgba(106,219,106,0.15);
      color: #6adb6a;
      border-radius: 6px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .btn-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    /* mode: viet-only */
    body.viet-mode .hanzi { display: none !important; }
    body.viet-mode .btn-row { display: none !important; }
    body.viet-mode .info { display: block !important; }
    body.viet-mode .info .pinyin { display: none; }
    body.viet-mode .card.revealed .hanzi { display: block !important; }
    body.viet-mode .card.revealed .btn-row { display: flex !important; }
    body.viet-mode .card.revealed .info .pinyin { display: block; }

    /* mode: hanzi-only */
    body.hanzi-mode .hanzi { display: block !important; }
    body.hanzi-mode .btn-row { display: none !important; }
    body.hanzi-mode .info { display: none !important; }
    body.hanzi-mode .card.revealed .info { display: block !important; }
    body.hanzi-mode .card.revealed .btn-row { display: flex !important; }

    /* mode: sentence */
    body.sentence-mode .grid {
      grid-template-columns: 1fr !important;
      max-width: 760px !important;
    }
    body.sentence-mode .card {
      align-items: flex-start !important;
      padding: 16px 18px !important;
      transform: none !important;
    }
    body.sentence-mode .card:hover { transform: none !important; border-color: #a0c4ff; }
    body.sentence-mode .hanzi { display: none !important; }
    body.sentence-mode .btn-row { display: none !important; }
    body.sentence-mode .info { display: none !important; }
    body.sentence-mode .example-box {
      display: block !important;
      border-left: none !important;
      background: none !important;
      padding: 0 !important;
      margin-top: 0 !important;
      width: 100% !important;
    }
    body.sentence-mode .ex-zh {
      font-size: 1.15rem !important;
      line-height: 1.6 !important;
      word-break: keep-all !important;
    }
    body.sentence-mode .ex-pinyin { display: none; font-size: 0.85rem !important; line-height: 1.6 !important; }
    body.sentence-mode .ex-viet { display: none; font-size: 0.85rem !important; line-height: 1.6 !important; }
    body.sentence-mode .card.revealed { background: #0f3460 !important; border-color: #4cc9f0; }
    body.sentence-mode .card.revealed .ex-pinyin { display: block !important; }
    body.sentence-mode .card.revealed .ex-viet { display: block !important; }
    body.sentence-mode .analyze-btn { margin-top: 10px; }
    body.sentence-mode .word-table th,
    body.sentence-mode .word-table td { font-size: 0.85rem; }
    body.sentence-mode .word-table td:first-child { font-size: 1rem; }

    .top-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .mode-btn {
      background: #0f3460;
      border: 1px solid #4cc9f0;
      color: #4cc9f0;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn:hover { background: #4cc9f0; color: #1a1a2e; }
    .mode-btn.active { background: #4cc9f0; color: #1a1a2e; font-weight: bold; }

    .part-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .part-btn {
      background: #0a0a1a;
      border: 1px solid #333;
      color: #888;
      padding: 5px 14px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .part-btn:hover { border-color: #a0c4ff; color: #a0c4ff; }
    .part-btn.current { background: #16213e; border-color: #a0c4ff; color: #a0c4ff; font-weight: bold; cursor: default; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<h1>Part 1 · Từ vựng tiếng Trung</h1>

<div class="part-nav">
  <span class="part-btn current">Part 1</span>
  <a class="part-btn" href="part2.html">Part 2</a>
  <a class="part-btn" href="part3.html">Part 3</a>
  <a class="part-btn" href="part4.html">Part 4</a>
  <a class="part-btn" href="sentences.html">Câu</a>
</div>

<div class="top-bar">
  <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">🔊 Chế độ thường</button>
  <button class="mode-btn" id="btn-hanzi" onclick="setMode('hanzi')">汉 Chỉ chữ Hán</button>
  <button class="mode-btn" id="btn-viet" onclick="setMode('viet')">🇻🇳 Chỉ tiếng Việt</button>
  <button class="mode-btn" id="btn-sentence" onclick="setMode('sentence')">📖 Câu ví dụ</button>
</div>

<div class="grid" id="grid"></div>

<script src="words-data.js"></script>

// shuffle
const grid = document.getElementById('grid');
words.sort(() => Math.random() - 0.5);

function speak(text, e) {
  e.stopPropagation();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-CN';
  utt.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

words.forEach(w => {
  const card = document.createElement('div');
  card.className = 'card';

  const analysis = wordAnalysis[w.zh] || [];
  const tableRows = analysis.map(wd =>
    `<tr>
      <td>${wd.zh}</td>
      <td>${wd.pinyin}</td>
      <td>${wd.viet}</td>
      <td><button class="add-word-btn" data-zh="${wd.zh}" data-pinyin="${wd.pinyin}" data-viet="${wd.viet}">+ Add</button></td>
    </tr>`
  ).join('');

  card.innerHTML = `
    <div class="hanzi">${w.zh}</div>
    <div class="btn-row">
      <button class="speaker-btn" title="Phát âm">🔊</button>
      <button class="copy-btn" title="Copy">📋</button>
      <button class="example-btn" title="Câu ví dụ">📖</button>
    </div>
    <div class="info">
      <div class="pinyin">${w.pinyin}</div>
      <div class="viet">${w.viet}</div>
    </div>
    <div class="example-box">
      <div class="ex-zh">${w.ex.zh}</div>
      <div class="ex-pinyin">${w.ex.pinyin}</div>
      <div class="ex-viet">${w.ex.viet}</div>
      <button class="analyze-btn">▼ Phân tích từng từ</button>
      <table class="word-table">
        <thead><tr><th>Chữ</th><th>Pinyin</th><th>Nghĩa</th><th></th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;

  // click card → toggle reveal
  card.addEventListener('click', () => {
    card.classList.toggle('revealed');
  });

  // speaker button → speak only
  card.querySelector('.speaker-btn').addEventListener('click', (e) => {
    speak(w.zh, e);
  });

  // copy button → copy hanzi
  card.querySelector('.copy-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(w.zh).then(() => {
      const btn = e.currentTarget;
      btn.textContent = '✅';
      setTimeout(() => btn.textContent = '📋', 1200);
    });
  });

  // example button → toggle example box
  card.querySelector('.example-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const box = card.querySelector('.example-box');
    const btn = e.currentTarget;
    const showing = box.classList.toggle('show');
    btn.textContent = showing ? '✖' : '📖';
  });

  // analyze button → toggle word table
  card.querySelector('.analyze-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const table = card.querySelector('.word-table');
    const btn = e.currentTarget;
    const showing = table.classList.toggle('show');
    btn.textContent = showing ? '▲ Ẩn phân tích' : '▼ Phân tích từng từ';
  });

  // add-word buttons inside table
  card.querySelectorAll('.add-word-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const zh = btn.dataset.zh;
      const pinyin = btn.dataset.pinyin;
      const viet = btn.dataset.viet;
      if (btn.classList.contains('added')) return;
      addWordToGrid({ zh, pinyin, viet });
      btn.textContent = '✓ Added';
      btn.classList.add('added');
    });
  });

  grid.appendChild(card);
});

const addedWords = new Set();

function addWordToGrid(w) {
  if (addedWords.has(w.zh)) return;
  addedWords.add(w.zh);

  const card = document.createElement('div');
  card.className = 'card added-card';

  card.innerHTML = `
    <div class="hanzi" style="display:none">${w.zh}</div>
    <div class="btn-row">
      <button class="speaker-btn" title="Phát âm">🔊</button>
      <button class="copy-btn" title="Copy">📋</button>
    </div>
    <div class="info" style="display:none">
      <div class="pinyin">${w.pinyin}</div>
      <div class="viet">${w.viet}</div>
    </div>
    <div style="font-size:0.65rem;color:#6adb6a;margin-top:2px">✦ added</div>
  `;

  card.addEventListener('click', () => card.classList.toggle('revealed'));

  card.querySelector('.speaker-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const utt = new SpeechSynthesisUtterance(w.zh);
    utt.lang = 'zh-CN'; utt.rate = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  });

  card.querySelector('.copy-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(w.zh).then(() => {
      const btn = e.currentTarget;
      btn.textContent = '✅';
      setTimeout(() => btn.textContent = '📋', 1200);
    });
  });

  // flash highlight khi thêm vào
  card.style.borderColor = '#6adb6a';
  setTimeout(() => { if (!card.classList.contains('revealed')) card.style.borderColor = ''; }, 2000);

  grid.appendChild(card);

  // scroll xuống để thấy thẻ mới
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setMode(mode) {
  document.body.classList.remove('hanzi-mode', 'viet-mode', 'sentence-mode');
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.card').forEach(c => c.classList.remove('revealed'));
  // ẩn tất cả example-box khi đổi mode
  document.querySelectorAll('.example-box').forEach(b => b.classList.remove('show'));
  document.querySelectorAll('.example-btn').forEach(b => b.textContent = '📖');

  if (mode === 'hanzi') {
    document.body.classList.add('hanzi-mode');
    document.getElementById('btn-hanzi').classList.add('active');
  } else if (mode === 'viet') {
    document.body.classList.add('viet-mode');
    document.getElementById('btn-viet').classList.add('active');
  } else if (mode === 'sentence') {
    document.body.classList.add('sentence-mode');
    document.getElementById('btn-sentence').classList.add('active');
  } else {
    document.getElementById('btn-normal').classList.add('active');
  }
}
</script>
</body>
</html>
