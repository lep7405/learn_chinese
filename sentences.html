<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luyện câu tiếng Trung</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
        padding: 20px 16px;
      }

      h1 {
        text-align: center;
        font-size: 1.3rem;
        color: #a0c4ff;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }

      .subtitle {
        text-align: center;
        font-size: 0.8rem;
        color: #555;
        margin-bottom: 18px;
      }

      .part-nav {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .part-btn {
        background: #0a0a1a;
        border: 1px solid #333;
        color: #888;
        padding: 5px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 0.85rem;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
        text-decoration: none;
        display: inline-block;
      }
      .part-btn:hover {
        border-color: #a0c4ff;
        color: #a0c4ff;
      }
      .part-btn.current {
        background: #16213e;
        border-color: #a0c4ff;
        color: #a0c4ff;
        font-weight: bold;
        cursor: default;
      }

      .top-bar {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }

      .mode-btn {
        background: #0f3460;
        border: 1px solid #4cc9f0;
        color: #4cc9f0;
        padding: 7px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.85rem;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .mode-btn:hover {
        background: #4cc9f0;
        color: #1a1a2e;
      }
      .mode-btn.active {
        background: #4cc9f0;
        color: #1a1a2e;
        font-weight: bold;
      }

      .progress-bar-wrap {
        max-width: 700px;
        margin: 0 auto 16px;
        background: #0f3460;
        border-radius: 10px;
        height: 6px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: #4cc9f0;
        border-radius: 10px;
        transition: width 0.3s;
      }
      .progress-label {
        text-align: center;
        font-size: 0.75rem;
        color: #555;
        margin-bottom: 14px;
      }

      /* === LIST MODE === */
      .list-container {
        max-width: 700px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .sentence-card {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 14px;
        padding: 16px 18px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
        user-select: none;
      }
      .sentence-card:hover {
        border-color: #a0c4ff;
      }
      .sentence-card.revealed {
        background: #0f3460;
        border-color: #4cc9f0;
      }

      .sc-header {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .sc-word-tag {
        font-size: 0.72rem;
        background: rgba(76, 201, 240, 0.15);
        color: #4cc9f0;
        border-radius: 8px;
        padding: 2px 8px;
        flex-shrink: 0;
      }
      .sc-zh {
        font-size: 1.15rem;
        color: #f0f0f0;
        flex: 1;
      }
      .sc-speak-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        padding: 2px 6px;
        border-radius: 8px;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .sc-speak-btn:hover {
        background: rgba(76, 201, 240, 0.15);
      }

      .sc-reveal {
        display: none;
        margin-top: 12px;
        animation: fadeIn 0.2s ease;
      }
      .sentence-card.revealed .sc-reveal {
        display: block;
      }

      .sc-pinyin {
        font-size: 0.85rem;
        color: #4cc9f0;
        margin-bottom: 4px;
      }
      .sc-meaning {
        font-size: 0.9rem;
        color: #a0c4ff;
        margin-bottom: 10px;
      }

      .sc-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }
      .sc-table th {
        color: #555;
        font-weight: normal;
        padding: 3px 8px;
        border-bottom: 1px solid #0f3460;
        text-align: left;
      }
      .sc-table td {
        padding: 5px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .sc-table td:first-child {
        font-size: 1.05rem;
        color: #f0f0f0;
      }
      .sc-table td:nth-child(2) {
        color: #4cc9f0;
      }
      .sc-table td:nth-child(3) {
        color: #a0c4ff;
      }

      /* === FLASHCARD MODE === */
      .flashcard-container {
        display: none;
        max-width: 600px;
        margin: 0 auto;
      }

      .flashcard {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 20px;
        padding: 32px 28px;
        text-align: center;
        min-height: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        user-select: none;
        margin-bottom: 16px;
      }
      .flashcard.revealed {
        background: #0f3460;
        border-color: #4cc9f0;
      }
      .flashcard:hover {
        border-color: #a0c4ff;
      }

      .fc-word-tag {
        font-size: 0.72rem;
        background: rgba(76, 201, 240, 0.15);
        color: #4cc9f0;
        border-radius: 8px;
        padding: 2px 10px;
      }
      .fc-zh {
        font-size: 1.6rem;
        color: #f0f0f0;
        line-height: 1.4;
      }
      .fc-hint {
        font-size: 0.78rem;
        color: #444;
      }
      .fc-reveal {
        display: none;
        animation: fadeIn 0.2s ease;
      }
      .flashcard.revealed .fc-reveal {
        display: block;
      }
      .flashcard.revealed .fc-hint {
        display: none;
      }

      .fc-pinyin {
        font-size: 0.95rem;
        color: #4cc9f0;
        margin-bottom: 6px;
      }
      .fc-meaning {
        font-size: 1rem;
        color: #a0c4ff;
        margin-bottom: 14px;
      }

      .fc-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
        text-align: left;
      }
      .fc-table td {
        padding: 4px 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .fc-table td:first-child {
        font-size: 1rem;
        color: #f0f0f0;
      }
      .fc-table td:nth-child(2) {
        color: #4cc9f0;
      }
      .fc-table td:nth-child(3) {
        color: #a0c4ff;
      }

      .fc-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .fc-btn {
        padding: 10px 28px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: bold;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      .fc-btn:active {
        transform: scale(0.95);
      }
      .fc-btn-know {
        background: #4cc9f0;
        color: #1a1a2e;
      }
      .fc-btn-dontknow {
        background: #0f3460;
        color: #f0f0f0;
        border: 1px solid #4cc9f0;
      }
      .fc-btn-speak {
        background: none;
        border: 1px solid #333;
        color: #888;
      }
      .fc-btn-speak:hover {
        border-color: #4cc9f0;
        color: #4cc9f0;
      }

      /* hidden nhau */
      body.mode-list .flashcard-container {
        display: none;
      }
      body.mode-list .list-container {
        display: flex;
      }
      body.mode-flash .list-container {
        display: none;
      }
      body.mode-flash .flashcard-container {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="mode-list">
    <h1>Luyện câu · 练句子</h1>
    <p class="subtitle">Ấn vào thẻ để xem pinyin, nghĩa và phân tích từng từ</p>

    <div class="part-nav">
      <a class="part-btn" href="shopping-words.html">Part 1</a>
      <a class="part-btn" href="part2.html">Part 2</a>
      <a class="part-btn" href="part3.html">Part 3</a>
      <a class="part-btn" href="part4.html">Part 4</a>
      <span class="part-btn current">Câu</span>
    </div>

    <div class="top-bar">
      <button class="mode-btn active" id="btn-list" onclick="setMode('list')">☰ Danh sách</button>
      <button class="mode-btn" id="btn-flash" onclick="setMode('flash')">⚡ Flashcard</button>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width: 0%"></div>
    </div>
    <p class="progress-label" id="progressLabel">0 / 0 đã nhớ</p>

    <!-- LIST MODE -->
    <div class="list-container" id="listContainer"></div>

    <!-- FLASHCARD MODE -->
    <div class="flashcard-container" id="flashContainer">
      <div class="flashcard" id="flashcard" onclick="revealFlash()">
        <div class="fc-word-tag" id="fcWordTag"></div>
        <div class="fc-zh" id="fcZh"></div>
        <p class="fc-hint">Ấn để xem nghĩa & phân tích</p>
        <div class="fc-reveal" id="fcReveal">
          <div class="fc-pinyin" id="fcPinyin"></div>
          <div class="fc-meaning" id="fcMeaning"></div>
          <table class="fc-table" id="fcTable"></table>
        </div>
      </div>
      <div class="fc-actions">
        <button class="fc-btn fc-btn-speak" onclick="speakCurrent()">🔊 Phát âm</button>
        <button class="fc-btn fc-btn-dontknow" onclick="markCard(false)">✗ Chưa nhớ</button>
        <button class="fc-btn fc-btn-know" onclick="markCard(true)">✓ Nhớ rồi</button>
      </div>
    </div>

      // ── LIST MODE ──────────────────────────────────────────────
      function renderList() {
        const container = document.getElementById("listContainer");
        container.innerHTML = "";

        allData.forEach((item) => {
          const card = document.createElement("div");
          card.className = "sentence-card";

          const rows = item.analysis.map((a) => `<tr><td>${a.word}</td><td>${a.pinyin}</td><td>${a.meaning}</td></tr>`).join("");

          card.innerHTML = `
      <div class="sc-header">
        <span class="sc-word-tag">${item.word}</span>
        <span class="sc-zh">${item.sentence}</span>
        <button class="sc-speak-btn" title="Phát âm">🔊</button>
      </div>
      <div class="sc-reveal">
        <div class="sc-pinyin">${item.pinyin}</div>
        <div class="sc-meaning">${item.meaning}</div>
        <table class="sc-table">
          <thead><tr><th>Từ</th><th>Pinyin</th><th>Nghĩa</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;

          card.addEventListener("click", () => card.classList.toggle("revealed"));
          card.querySelector(".sc-speak-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            speak(item.sentence);
          });

          container.appendChild(card);
        });
      }

      // ── FLASHCARD MODE ─────────────────────────────────────────
      function renderFlash() {
        if (flashQueue.length === 0) {
          document.getElementById("flashcard").innerHTML = `
      <div style="color:#6adb6a;font-size:1.2rem">🎉 Xong rồi!</div>
      <div style="color:#888;font-size:0.85rem;margin-top:8px">Bạn đã đi qua tất cả các câu.</div>
      <button onclick="restartFlash()" style="margin-top:16px;padding:8px 20px;border-radius:14px;border:1px solid #4cc9f0;background:none;color:#4cc9f0;cursor:pointer;font-size:0.9rem">Học lại từ đầu</button>
    `;
          return;
        }

        const item = flashQueue[flashIndex % flashQueue.length];
        const fc = document.getElementById("flashcard");
        fc.classList.remove("revealed");

        document.getElementById("fcWordTag").textContent = item.word;
        document.getElementById("fcZh").textContent = item.sentence;
        document.getElementById("fcPinyin").textContent = item.pinyin;
        document.getElementById("fcMeaning").textContent = item.meaning;

        const rows = item.analysis.map((a) => `<tr><td>${a.word}</td><td>${a.pinyin}</td><td>${a.meaning}</td></tr>`).join("");
        document.getElementById("fcTable").innerHTML = rows;
      }

      function revealFlash() {
        document.getElementById("flashcard").classList.add("revealed");
      }

      function markCard(know) {
        if (know) {
          flashQueue.splice(flashIndex % flashQueue.length, 1);
          knownCount++;
        } else {
          // đưa về cuối queue
          const item = flashQueue.splice(flashIndex % flashQueue.length, 1)[0];
          flashQueue.push(item);
        }
        updateProgress();
        renderFlash();
      }

      function restartFlash() {
        flashQueue = [...allData];
        flashQueue.sort(() => Math.random() - 0.5);
        knownCount = 0;
        updateProgress();
        renderFlash();
      }

      function updateProgress() {
        const total = allData.length;
        const known = knownCount;
        const pct = total > 0 ? (known / total) * 100 : 0;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressLabel").textContent = `${known} / ${total} đã nhớ`;
      }

      function speakCurrent() {
        if (flashQueue.length === 0) return;
        const item = flashQueue[flashIndex % flashQueue.length];
        speak(item.sentence);
      }

      function speak(text) {
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = "zh-CN";
        utt.rate = 0.85;
        speechSynthesis.cancel();
        speechSynthesis.speak(utt);
      }

      function setMode(mode) {
        document.body.className = "mode-" + mode;
        document.querySelectorAll(".mode-btn").forEach((b) => b.classList.remove("active"));
        document.getElementById("btn-" + mode).classList.add("active");
      }

      init();
    </script>
